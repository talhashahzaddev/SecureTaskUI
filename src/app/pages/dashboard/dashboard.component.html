<div class="dashboard-wrapper">

  <!-- Top Navbar -->
  <div class="navbar">
    <span>📋 Task Manager</span>
    <div class="user-info">
      <span>👤 {{ auth.getUsername() }} ({{ auth.getRole() }})</span>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </div>
 <div class="notification-banner" *ngIf="notification">
    {{ notification }}
  </div>
  <div class="content">

    <!-- Add Task Form -->
    <div class="card">
      <h3>Add New Task</h3>

      <div class="form-group">
        <label>Title *</label>
        <input type="text" [(ngModel)]="newTitle" placeholder="Task title" />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="newDescription" placeholder="Task description" rows="3"></textarea>
      </div>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="success" *ngIf="successMessage">{{ successMessage }}</p>

      <button (click)="addTask()">Add Task</button>
    </div>

    <!-- Task List -->
    <div class="card">
      <h3>Tasks</h3>

      <p *ngIf="tasks.length === 0" class="empty">No tasks yet. Add one above!</p>

      <div class="task-item" *ngFor="let task of tasks">
        <div class="task-info">
          <strong>{{ task.title }}</strong>
          <p>{{ task.description }}</p>
        </div>

        <!-- Only show delete button for Admin -->
        <button
          class="delete-btn"
          *ngIf="auth.isAdmin()"
          (click)="deleteTask(task.id)">
          🗑 Delete
        </button>
      </div>
    </div>

  </div>
</div>
